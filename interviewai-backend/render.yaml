services:
  - type: web
    name: interviewai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: interviewai-data
      mountPath: /opt/render/project/src
      sizeGB: 1
